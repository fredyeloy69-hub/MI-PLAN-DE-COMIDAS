<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificador Nutricional Semanal</title>
  <style>
    :root { --azul:#4a90e2; --azul-oscuro:#2c3e50; --verde:#28a745; --rojo:#dc3545; --oro:#ffd700; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f4f9; color: #333; }
    h1 { text-align: center; padding: 18px; color: var(--azul-oscuro); font-size: 22px; background: white; border-bottom: 3px solid var(--azul); }
    .barra { background: white; padding: 10px 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
    .barra input { border: 1px solid #ccc; border-radius: 6px; padding: 6px 12px; font-size: 13px; width: 280px; outline: none; }
    .barra input:focus { border-color: var(--azul); }
    .badge { font-size: 11px; background: #e8f0fe; color: var(--azul); border-radius: 12px; padding: 3px 10px; font-weight: 600; }
    .contenedor { padding: 20px; max-width: 1400px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,.12); border-radius: 8px; overflow: hidden; }
    th { background: var(--azul); color: white; padding: 8px 6px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
    td { border: 1px solid #e0e0e0; padding: 5px 6px; font-size: 12px; vertical-align: middle; }
    .dia-header { background: var(--azul-oscuro); color: white; font-weight: 700; font-size: 14px; text-align: center; }
    .bloque-header { background: #e8f0fe; font-weight: 700; color: var(--azul-oscuro); font-size: 11px; text-align: center; }
    .total-bloque { background: #dff0d8; font-weight: 700; font-size: 11px; }
    .total-dia { background: var(--oro); font-weight: 700; font-size: 12px; }
    .separador td { background: #f4f4f9; height: 10px; border: none; }
    select { width: 180px; padding: 3px 4px; font-size: 11px; border: 1px solid #ccc; border-radius: 4px; }
    select:focus { outline: none; border-color: var(--azul); }
    input[type=number] { width: 55px; padding: 3px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
    .btn-add { background: var(--verde); color: white; border: none; padding: 3px 8px; cursor: pointer; border-radius: 4px; font-size: 11px; margin-top: 4px; }
    .btn-del { background: var(--rojo); color: white; border: none; padding: 2px 7px; cursor: pointer; border-radius: 4px; font-size: 11px; }
    .btn-add:hover { background: #218838; }
    .btn-del:hover { background: #c82333; }
    .fuente-tag { font-size: 9px; color: #888; display: block; }
    .num { text-align: right; }
    @media (max-width: 768px) { .contenedor { padding: 8px; } select { width: 130px; } }
  </style>
</head>
<body>

<h1>🥗 Planificador Nutricional Semanal</h1>

<div class="barra">
  <input type="text" id="buscador" placeholder="🔍 Buscar alimento en la base de datos..." oninput="actualizarOpciones()">
  <span class="badge" id="badge-total">0 alimentos cargados</span>
  <span class="badge" id="badge-filtro" style="display:none"></span>
</div>

<div class="contenedor">
  <div id="contenedorTablas"></div>
</div>

<script src="alimentos.js"></script>
<script>
const estructuraSemana = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
const bloquesComida = [
  "DESAYUNO / ALMUERZO / CENA",
  "BATIDO MAÑANA",
  "BATIDO MEDIAMAÑANA",
  "BATIDO NOCHE"
];

let planSemanal = {};
estructuraSemana.forEach(dia => {
  planSemanal[dia] = {
    "DESAYUNO / ALMUERZO / CENA": [
      { nombre: "Huevo entero cocido", gramos: 150 },
      { nombre: "Atún en conserva", gramos: 80 },
      { nombre: "Palta", gramos: 100 }
    ],
    "BATIDO MAÑANA": [
      { nombre: "Avena envasada", gramos: 50 },
      { nombre: "Leche entera pasteurizada", gramos: 125 }
    ],
    "BATIDO MEDIAMAÑANA": [
      { nombre: "Fresa", gramos: 100 }
    ],
    "BATIDO NOCHE": [
      { nombre: "Leche entera pasteurizada", gramos: 250 },
      { nombre: "Almendra", gramos: 20 }
    ]
  };
});

// baseDatos viene del script alimentos.js
let filtroActivo = "";
let opcionesHTML = "";

function actualizarOpciones() {
  filtroActivo = document.getElementById('buscador').value.toLowerCase().trim();
  const badge = document.getElementById('badge-filtro');
  if (filtroActivo) {
    const count = baseDatos.filter(a => a.nombre.toLowerCase().includes(filtroActivo)).length;
    badge.textContent = `${count} coincidencias`;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
  construirOpcionesHTML();
  renderizarTodo();
}

function construirOpcionesHTML() {
  const lista = filtroActivo
    ? baseDatos.filter(a => a.nombre.toLowerCase().includes(filtroActivo))
    : baseDatos;
  opcionesHTML = lista.map(a =>
    `<option value="${a.nombre.replace(/"/g,'&quot;')}" data-fuente="${a.fuente}">${a.nombre} [${a.fuente === 'Tablas Peruanas' ? 'PE' : 'INT'}]</option>`
  ).join('');
}

function calcularNutrientes(nombre, gramos) {
  const item = baseDatos.find(a => a.nombre.toLowerCase() === nombre.toLowerCase());
  if (!item || !gramos) return { kcal:0, prot:0, carb:0, grasa:0, fibra:0 };
  const f = gramos / 100;
  return {
    kcal:  ((item.kcal  || 0) * f),
    prot:  ((item.proteinas || 0) * f),
    carb:  ((item.carbohidratos || 0) * f),
    grasa: ((item.grasas || 0) * f),
    fibra: ((item.fibra || 0) * f),
  };
}

function fmt(n) { return n.toFixed(1); }

function contarFilasDia(dia) {
  let total = 0;
  bloquesComida.forEach(b => total += (planSemanal[dia][b]?.length || 0) + 2); // items + subtotal + header bloque
  return total + 1; // total dia
}

function renderizarTodo() {
  const cont = document.getElementById('contenedorTablas');
  let html = `<table>
    <thead><tr>
      <th style="width:70px">DÍA</th>
      <th style="width:120px">BLOQUE</th>
      <th>ALIMENTO</th>
      <th style="width:65px">PORCIÓN (g)</th>
      <th style="width:65px">KCAL</th>
      <th style="width:60px">PROT (g)</th>
      <th style="width:60px">CARB (g)</th>
      <th style="width:60px">GRASA (g)</th>
      <th style="width:60px">FIBRA (g)</th>
      <th style="width:45px">DEL</th>
    </tr></thead><tbody>`;

  estructuraSemana.forEach(dia => {
    let diaT = {kcal:0,prot:0,carb:0,grasa:0,fibra:0};
    let firstDia = true;
    const totalFilasDia = contarFilasDia(dia);

    bloquesComida.forEach(bloque => {
      const items = planSemanal[dia][bloque] || [];

      // Fila header bloque
      html += `<tr>`;
      if (firstDia) {
        html += `<td rowspan="${totalFilasDia}" class="dia-header">${dia}</td>`;
        firstDia = false;
      }
      html += `<td class="bloque-header" colspan="8">${bloque}
        <button class="btn-add" onclick="agregarFila('${dia}','${bloque}')">+ Agregar</button>
      </td><td></td></tr>`;

      let bloqT = {kcal:0,prot:0,carb:0,grasa:0,fibra:0};

      items.forEach((item, idx) => {
        const n = calcularNutrientes(item.nombre, item.gramos);
        bloqT.kcal+=n.kcal; bloqT.prot+=n.prot; bloqT.carb+=n.carb; bloqT.grasa+=n.grasa; bloqT.fibra+=n.fibra;
        diaT.kcal+=n.kcal;  diaT.prot+=n.prot;  diaT.carb+=n.carb;  diaT.grasa+=n.grasa;  diaT.fibra+=n.fibra;

        const selOpts = `<option value="">-- Seleccionar --</option>${opcionesHTML}`;
        html += `<tr>
          <td>
            <select onchange="cambiarAlimento('${dia}','${bloque}',${idx},this.value)">
              ${baseDatos.map(a => `<option value="${a.nombre.replace(/"/g,'&quot;')}" ${a.nombre===item.nombre?'selected':''}>${a.nombre} [${a.fuente==='Tablas Peruanas'?'PE':'INT'}]</option>`).join('')}
            </select>
          </td>
          <td><input type="number" value="${item.gramos}" step="5" min="0" onchange="cambiarGramos('${dia}','${bloque}',${idx},this.value)"></td>
          <td class="num">${fmt(n.kcal)}</td>
          <td class="num">${fmt(n.prot)}</td>
          <td class="num">${fmt(n.carb)}</td>
          <td class="num">${fmt(n.grasa)}</td>
          <td class="num">${fmt(n.fibra)}</td>
          <td><button class="btn-del" onclick="eliminarFila('${dia}','${bloque}',${idx})">✕</button></td>
        </tr>`;
      });

      // Subtotal bloque
      html += `<tr class="total-bloque">
        <td colspan="2" style="text-align:right">Subtotal ${bloque}:</td>
        <td class="num">${fmt(bloqT.kcal)}</td><td class="num">${fmt(bloqT.prot)}</td>
        <td class="num">${fmt(bloqT.carb)}</td><td class="num">${fmt(bloqT.grasa)}</td>
        <td class="num">${fmt(bloqT.fibra)}</td><td></td>
      </tr>`;
    });

    // Total día
    html += `<tr class="total-dia">
      <td colspan="3" style="text-align:right">TOTAL ${dia.toUpperCase()}:</td>
      <td class="num">${fmt(diaT.kcal)}</td><td class="num">${fmt(diaT.prot)}</td>
      <td class="num">${fmt(diaT.carb)}</td><td class="num">${fmt(diaT.grasa)}</td>
      <td class="num">${fmt(diaT.fibra)}</td><td></td>
    </tr>
    <tr class="separador"><td colspan="10"></td></tr>`;
  });

  html += `</tbody></table>`;
  cont.innerHTML = html;
}

function cambiarAlimento(dia, bloque, idx, val) {
  planSemanal[dia][bloque][idx].nombre = val;
  renderizarTodo();
}
function cambiarGramos(dia, bloque, idx, val) {
  planSemanal[dia][bloque][idx].gramos = parseFloat(val) || 0;
  renderizarTodo();
}
function agregarFila(dia, bloque) {
  const primero = baseDatos[0]?.nombre || "";
  planSemanal[dia][bloque].push({ nombre: primero, gramos: 100 });
  renderizarTodo();
}
function eliminarFila(dia, bloque, idx) {
  planSemanal[dia][bloque].splice(idx, 1);
  renderizarTodo();
}

// Iniciar
document.getElementById('badge-total').textContent = `${baseDatos.length} alimentos cargados`;
construirOpcionesHTML();
renderizarTodo();
</script>
</body>
</html>
