<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Nutricional</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; color: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; overflow: hidden; text-overflow: ellipsis; }
    th { background-color: #f4f4f4; font-size: 0.9em; }
    /* Ampliar columna de alimento y optimizar ancho de inputs */
    th:nth-child(1), td:nth-child(1) { width: 34%; text-align: left; }
    th:nth-child(2), td:nth-child(2) { width: 10%; }
    th:nth-child(3), td:nth-child(3),
    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5),
    th:nth-child(6), td:nth-child(6),
    th:nth-child(7), td:nth-child(7) { width: 9%; }
    th:nth-child(8), td:nth-child(8) { width: 8%; }

    input[type="text"], input[type="number"] { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #aaa; border-radius: 3px; }
    .btn { padding: 8px 14px; margin: 5px 0; cursor: pointer; font-weight: bold; }
    .btn-danger { background-color: #e63946; color: white; border: none; border-radius: 3px; padding: 4px 8px; }
    .btn-add { background-color: #2a9d8f; color: white; border: none; border-radius: 3px; }
    .total-row { font-weight: bold; background-color: #e8f5e9; }
  </style>
</head>
<body>

  <h2>Planificador Nutricional</h2>
  <button class="btn btn-add" onclick="agregarFila()">+ Agregar Fila</button>

  <!-- Datalist global -->
  <datalist id="lista-alimentos"></datalist>

  <table id="tabla-nutricional">
    <thead>
      <tr>
        <th>Alimento (Base 100g)</th>
        <th>Porción (g)</th>
        <th>Calorías (kcal)</th>
        <th>Proteínas (g)</th>
        <th>Carbs (g)</th>
        <th>Grasas (g)</th>
        <th>Fibra (g)</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="cuerpo-tabla">
      <!-- Las filas se insertan dinámicamente aquí -->
    </tbody>
    <tfoot>
      <tr class="total-row">
        <td colspan="2" style="text-align: right;">TOTAL DIARIO:</td>
        <td id="total-cal">0.0</td>
        <td id="total-prot">0.0</td>
        <td id="total-carb">0.0</td>
        <td id="total-gras">0.0</td>
        <td id="total-fibr">0.0</td>
        <td></td>
      </tr>
    </tfoot>
  </table>

  <!-- Se enlaza la base de datos externa -->
  <script src="alimentos.js"></script>
  <script>
    // 1. PROCESAR BASE DE DATOS (Mapeo limpio sin sufijos PE/INT en el nombre visible)
    const datosExternos = typeof baseDatos !== 'undefined' ? baseDatos : [];
    const baseDatosAlimentos = datosExternos.length > 0 ? datosExternos.map(item => ({
      nombre: item.nombre.trim(),
      cal: item.kcal || 0,
      prot: item.proteinas || 0,
      carb: item.carbohidratos || 0,
      gras: item.grasas || 0,
      fibr: item.fibra || 0
    })) : [
      { nombre: "Achita, kiwicha o achis", cal: 351, prot: 12.8, carb: 69.1, gras: 6.6, fibr: 9.3 },
      { nombre: "Palta", cal: 130, prot: 1.7, carb: 5.6, gras: 12.5, fibr: 0.0 },
      { nombre: "Avena envasada", cal: 380, prot: 13.6, carb: 71.2, gras: 4.8, fibr: 8.0 },
      { nombre: "Fresa", cal: 34, prot: 0.7, carb: 8.9, gras: 0.8, fibr: 2.0 },
      { nombre: "Almendra", cal: 552, prot: 23.5, carb: 14.5, gras: 54.0, fibr: 10.0 }
    ];

    // 2. CARGAR LA LISTA AL DATALIST GLOBAL
    function inicializarLista() {
      const datalist = document.getElementById("lista-alimentos");
      datalist.innerHTML = "";
      
      baseDatosAlimentos.forEach(alimento => {
        const option = document.createElement("option");
        option.value = alimento.nombre;
        datalist.appendChild(option);
      });
    }

    // 3. AGREGAR NUEVA FILA
    function agregarFila() {
      const tbody = document.getElementById("cuerpo-tabla");
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td><input type="text" list="lista-alimentos" placeholder="Escribe el alimento..." onchange="calcularFila(this)"></td>
        <td><input type="number" value="100" min="0" step="any" oninput="calcularFila(this)"></td>
        <td class="sub-cal">0.0</td>
        <td class="sub-prot">0.0</td>
        <td class="sub-carb">0.0</td>
        <td class="sub-gras">0.0</td>
        <td class="sub-fibr">0.0</td>
        <td><button class="btn btn-danger" onclick="eliminarFila(this)">X</button></td>
      `;

      tbody.appendChild(tr);
    }

    // 4. ELIMINAR FILA
    function eliminarFila(boton) {
      const tr = boton.closest("tr");
      tr.remove();
      calcularTotales();
    }

    // 5. CALCULAR VALORES POR FILA SEGÚN PORCIÓN
    function calcularFila(elemento) {
      const tr = elemento.closest("tr");
      const inputNombre = tr.querySelector('input[type="text"]').value.trim();
      const inputGramos = parseFloat(tr.querySelector('input[type="number"]').value) || 0;

      const alimento = baseDatosAlimentos.find(item => item.nombre.toLowerCase() === inputNombre.toLowerCase());

      if (alimento && inputGramos > 0) {
        const factor = inputGramos / 100;
        tr.querySelector(".sub-cal").textContent = (alimento.cal * factor).toFixed(1);
        tr.querySelector(".sub-prot").textContent = (alimento.prot * factor).toFixed(1);
        tr.querySelector(".sub-carb").textContent = (alimento.carb * factor).toFixed(1);
        tr.querySelector(".sub-gras").textContent = (alimento.gras * factor).toFixed(1);
        tr.querySelector(".sub-fibr").textContent = (alimento.fibr * factor).toFixed(1);
      } else {
        tr.querySelectorAll(".sub-cal, .sub-prot, .sub-carb, .sub-gras, .sub-fibr").forEach(td => td.textContent = "0.0");
      }

      calcularTotales();
    }

    // 6. ACTUALIZAR TOTALES DIARIOS
    function calcularTotales() {
      let totCal = 0, totProt = 0, totCarb = 0, totGras = 0, totFibr = 0;

      document.querySelectorAll("#cuerpo-tabla tr").forEach(tr => {
        totCal += parseFloat(tr.querySelector(".sub-cal").textContent) || 0;
        totProt += parseFloat(tr.querySelector(".sub-prot").textContent) || 0;
        totCarb += parseFloat(tr.querySelector(".sub-carb").textContent) || 0;
        totGras += parseFloat(tr.querySelector(".sub-gras").textContent) || 0;
        totFibr += parseFloat(tr.querySelector(".sub-fibr").textContent) || 0;
      });

      document.getElementById("total-cal").textContent = totCal.toFixed(1);
      document.getElementById("total-prot").textContent = totProt.toFixed(1);
      document.getElementById("total-carb").textContent = totCarb.toFixed(1);
      document.getElementById("total-gras").textContent = totGras.toFixed(1);
      document.getElementById("total-fibr").textContent = totFibr.toFixed(1);
    }

    // Inicializar al cargar el documento
    window.onload = () => {
      inicializarLista();
      agregarFila();
    };
  </script>
</body>
</html>
