<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planificador Nutricional Profesional</title>
  <style>
    body { font-family: sans-serif; font-size: 13px; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
    th { background: #2c3e50; color: white; }
    select { width: 160px; padding: 2px; }
    input { width: 45px; text-align: center; }
    .total-fila { font-weight: bold; background: #f9f9f9; }
    .btn-del { color: red; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<h1>Planificador Nutricional Semanal</h1>
<table id="tablaPlan">
  <thead>
    <tr>
      <th>DÍA</th>
      <th>BLOQUE</th>
      <th>ALIMENTO</th>
      <th>g</th>
      <th>Kcal</th>
      <th>Prot</th>
      <th>Carb</th>
      <th>Grasa</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody id="cuerpoTabla"></tbody>
</table>

<script>
let baseDatos = [];

// 1. Estructura de la semana (Puedes agregar tantas filas como quieras aquí)
const planSemanal = [
  { dia: "Lunes", bloque: "Desayuno", alimento: "Arroz integral cocido", gramos: 150 },
  { dia: "Lunes", bloque: "Batido Mañana", alimento: "Atún fresco crudo", gramos: 80 },
  { dia: "Martes", bloque: "Desayuno", alimento: "Arroz integral cocido", gramos: 150 }
  // ... agrega aquí todo tu Excel línea por línea
];

async function iniciar() {
  try {
    const res = await fetch('alimentos.json');
    baseDatos = await res.json();
    renderizar();
  } catch (e) {
    alert("Error: No se encuentra el archivo alimentos.json. Verifica que esté subido.");
  }
}

function renderizar() {
  const cuerpo = document.getElementById('cuerpoTabla');
  cuerpo.innerHTML = '';
  
  planSemanal.forEach((item, index) => {
    const fila = document.createElement('tr');
    fila.id = `fila-${index}`;
    
    // Generar opciones con seguridad de que el alimento existe en la base
    let options = '<option value="">-- Seleccionar --</option>';
    baseDatos.forEach(a => {
      const selected = (a.nombre.toLowerCase().trim() === item.alimento.toLowerCase().trim()) ? 'selected' : '';
      options += `<option value="${a.nombre}" ${selected}>${a.nombre}</option>`;
    });

    fila.innerHTML = `
      <td>${item.dia}</td>
      <td>${item.bloque}</td>
      <td><select onchange="cambiarAlimento(${index}, this.value)">${options}</select></td>
      <td><input type="number" value="${item.gramos}" onchange="calcular(${index})"></td>
      <td class="kcal">0</td>
      <td class="prot">0</td>
      <td class="carb">0</td>
      <td class="grasa">0</td>
      <td><span class="btn-del" onclick="limpiarFila(${index})">X</span></td>
    `;
    cuerpo.appendChild(fila);
    calcular(index); // Calcular datos inmediatamente al cargar
  });
}

function cambiarAlimento(index, nuevoNombre) {
  // Al cambiar el select, actualizamos la referencia y recalculamos
  planSemanal[index].alimento = nuevoNombre;
  calcular(index);
}

function calcular(index) {
  const fila = document.getElementById(`fila-${index}`);
  const nombreSeleccionado = fila.querySelector('select').value;
  const gramos = fila.querySelector('input').value;
  
  // Buscar en base de datos sin errores de mayúsculas o espacios
  const data = baseDatos.find(a => a.nombre.toLowerCase().trim() === nombreSeleccionado.toLowerCase().trim());

  if (data) {
    const f = gramos / 100;
    fila.querySelector('.kcal').textContent = (data.kcal * f).toFixed(1);
    fila.querySelector('.prot').textContent = (data.proteinas * f).toFixed(1);
    fila.querySelector('.carb').textContent = (data.carbohidratos * f).toFixed(1);
    fila.querySelector('.grasa').textContent = (data.grasas * f).toFixed(1);
  } else {
    fila.querySelector('.kcal').textContent = '0';
    fila.querySelector('.prot').textContent = '0';
    fila.querySelector('.carb').textContent = '0';
    fila.querySelector('.grasa').textContent = '0';
  }
}

function limpiarFila(index) {
  const fila = document.getElementById(`fila-${index}`);
  fila.querySelector('select').value = "";
  calcular(index);
}

iniciar();
</script>
</body>
</html>
