<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Nutricional Semanal</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 98%;
            max-width: 1600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        #buscador {
            flex: 1;
            min-width: 280px;
            padding: 10px 16px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }

        #buscador:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            background: #e2e8f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Estilos del Planificador */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        th, td {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        .dia-col {
            background-color: #1e293b;
            color: white;
            font-weight: bold;
            text-align: center;
            vertical-align: middle;
        }

        .bloque-header {
            background-color: #f1f5f9;
            font-weight: bold;
        }

        .subtotal-row {
            background-color: #e2e8f0;
            font-weight: bold;
        }

        .total-row {
            background-color: #facc15;
            font-weight: bold;
        }

        select, input[type="number"] {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            width: 100%;
        }

        .btn-add {
            background: #10b981;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-del {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">🥗 Planificador Nutricional Semanal</h2>
        
        <div class="top-bar">
            <input type="text" id="buscador" placeholder="Buscar alimento por nombre o código..." oninput="handleSearch(event)">
            <div class="badges">
                <span class="badge" id="total-alimentos">0 alimentos cargados</span>
                <span class="badge" id="total-coincidencias">0 coincidencias</span>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 100px;">DÍA</th>
                    <th style="width: 180px;">BLOQUE</th>
                    <th>ALIMENTO</th>
                    <th style="width: 90px;">PORCIÓN (G)</th>
                    <th style="width: 70px;">KCAL</th>
                    <th style="width: 70px;">PROT (G)</th>
                    <th style="width: 70px;">CARB (G)</th>
                    <th style="width: 70px;">GRASA (G)</th>
                    <th style="width: 70px;">FIBRA (G)</th>
                    <th style="width: 50px;">DEL</th>
                </tr>
            </thead>
            <tbody id="tabla-planificador">
                <!-- Se inyecta dinámicamente -->
            </tbody>
        </table>
    </div>

    <script>
        // Base de datos de ejemplo (Reemplaza con tus 2030 elementos)
        let baseDatos = [
            { codigo: "A1", nombre: "Achita, kiwicha o achis [PE]", fuente: "Tablas", kcal: 351, proteinas: 12.8, grasas: 6.6, carbohidratos: 69.1, fibra: 9.3 },
            { codigo: "A2", nombre: "Arroz pilado cocido [PE]", fuente: "Tablas", kcal: 115, proteinas: 2.4, grasas: 0.1, carbohidratos: 25.2, fibra: 0 },
            { codigo: "P1", nombre: "Palta [PE]", fuente: "Tablas", kcal: 130, proteinas: 1.7, grasas: 12.5, carbohidratos: 5.6, fibra: 0 }
        ];

        let searchTimeout;

        function initApp() {
            document.getElementById('total-alimentos').innerText = `${baseDatos.length} alimentos cargados`;
            document.getElementById('total-coincidencias').innerText = `${baseDatos.length} coincidencias`;
            renderPlanificador(baseDatos);
        }

        function renderPlanificador(datosAlimentos) {
            const tbody = document.getElementById('tabla-planificador');
            // Aquí puedes reconstruir o mantener tu estructura por días (Lunes, Martes, etc.)
            let html = `
                <tr>
                    <td rowspan="6" class="dia-col">Lunes</td>
                    <td colspan="9" class="bloque-header">DESAYUNO <button class="btn-add">+ Agregar</button></td>
                </tr>
                <tr>
                    <td>
                        <select>
                            ${datosAlimentos.map(a => `<option>${a.nombre}</option>`).join('')}
                        </select>
                    </td>
                    <td><input type="number" value="100" onchange="calcularTotales()"></td>
                    <td>130.0</td><td>1.7</td><td>5.6</td><td>12.5</td><td>0.0</td>
                    <td><button class="btn-del">X</button></td>
                </tr>
                <tr class="subtotal-row">
                    <td colspan="3">Subtotal DESAYUNO</td>
                    <td>130.0</td><td>1.7</td><td>5.6</td><td>12.5</td><td>0.0</td>
                    <td></td>
                </tr>
                <tr class="total-row">
                    <td colspan="3">TOTAL LUNES</td>
                    <td>130.0</td><td>1.7</td><td>5.6</td><td>12.5</td><td>0.0</td>
                    <td></td>
                </tr>
            `;
            tbody.innerHTML = html;
        }

        // Búsqueda optimizada con Debounce de 250ms para evitar lentitud
        function handleSearch(event) {
            clearTimeout(searchTimeout);
            const query = event.target.value.toLowerCase();
            
            searchTimeout = setTimeout(() => {
                const filtrados = baseDatos.filter(item => 
                    item.nombre.toLowerCase().includes(query) || 
                    item.codigo.toLowerCase().includes(query)
                );
                document.getElementById('total-coincidencias').innerText = `${filtrados.length} coincidencias`;
                renderPlanificador(filtrados);
            }, 250);
        }

        function calcularTotales() {
            // Lógica de cálculo de macros en tiempo real
        }

        initApp();
    </script>
</body>
</html>
