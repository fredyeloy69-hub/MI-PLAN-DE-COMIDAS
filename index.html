<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Planificador Nutricional</title>
  <style>
    body { font-family: sans-serif; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px; text-align: center; }
    th { background: #2c3e50; color: white; }
    select { width: 150px; }
    input { width: 40px; }
    .btn-del { color: red; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<h1>Planificador Semanal</h1>
<table id="tablaPlan">
  <thead>
    <tr>
      <th>DÍA</th>
      <th>BLOQUE</th>
      <th>ALIMENTO</th>
      <th>g</th>
      <th>Kcal</th>
      <th>Prot</th>
      <th>Carb</th>
      <th>Grasa</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody id="cuerpoTabla"></tbody>
</table>

<script>
let baseDatos = [];

// Tu lista de alimentos fijos por día (configura esto según tu necesidad inicial)
// El sistema buscará el nombre en el JSON automáticamente
const menuInicial = [
  { dia: "Lunes", bloque: "Desayuno", alimento: "Arroz integral cocido", gramos: 150 },
  { dia: "Lunes", bloque: "Batido Mañana", alimento: "Atún fresco crudo", gramos: 80 }
  // ... puedes agregar todas las filas fijas que quieras aquí
];

async function cargarDatos() {
  const res = await fetch('alimentos.json');
  baseDatos = await res.json();
  renderizar();
}

function renderizar() {
  const cuerpo = document.getElementById('cuerpoTabla');
  cuerpo.innerHTML = '';
  
  menuInicial.forEach((item, index) => {
    const fila = document.createElement('tr');
    fila.id = `fila-${index}`;
    
    // Generar opciones del select
    let options = '<option value="">-- Seleccionar --</option>';
    baseDatos.forEach(a => {
      options += `<option value="${a.nombre}" ${a.nombre === item.alimento ? 'selected' : ''}>${a.nombre}</option>`;
    });

    fila.innerHTML = `
      <td>${item.dia}</td>
      <td>${item.bloque}</td>
      <td><select onchange="actualizarFila(${index}, this.value)">${options}</select></td>
      <td><input type="number" value="${item.gramos}" onchange="calcular(${index})"></td>
      <td class="kcal">0</td>
      <td class="prot">0</td>
      <td class="carb">0</td>
      <td class="grasa">0</td>
      <td><span class="btn-del" onclick="limpiarFila(${index})">X</span></td>
    `;
    cuerpo.appendChild(fila);
    calcular(index); // Calcular datos al cargar
  });
}

function actualizarFila(index, nombreAlimento) {
  const fila = document.getElementById(`fila-${index}`);
  const alimento = baseDatos.find(a => a.nombre === nombreAlimento);
  
  // Guardar datos en el dataset de la fila para cálculos
  fila.dataset.nutrientes = alimento ? JSON.stringify(alimento) : null;
  calcular(index);
}

function calcular(index) {
  const fila = document.getElementById(`fila-${index}`);
  const gramos = fila.querySelector('input').value;
  const data = fila.dataset.nutrientes ? JSON.parse(fila.dataset.nutrientes) : null;

  if (data) {
    const factor = gramos / 100;
    fila.querySelector('.kcal').textContent = (data.kcal * factor).toFixed(1);
    fila.querySelector('.prot').textContent = (data.proteinas * factor).toFixed(1);
    fila.querySelector('.carb').textContent = (data.carbohidratos * factor).toFixed(1);
    fila.querySelector('.grasa').textContent = (data.grasas * factor).toFixed(1);
  } else {
    fila.querySelector('.kcal').textContent = '0';
    fila.querySelector('.prot').textContent = '0';
    fila.querySelector('.carb').textContent = '0';
    fila.querySelector('.grasa').textContent = '0';
  }
}

function limpiarFila(index) {
  const fila = document.getElementById(`fila-${index}`);
  fila.querySelector('select').value = "";
  fila.dataset.nutrientes = null;
  calcular(index);
}

cargarDatos();
</script>
</body>
</html>
