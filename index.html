<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Nutricional Semanal</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 98%;
            max-width: 1600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        #buscador {
            flex: 1;
            min-width: 280px;
            padding: 10px 16px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }

        #buscador:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            background: #e2e8f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        th, td {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
        }

        .dia-col {
            background-color: #1e293b;
            color: white;
            font-weight: bold;
            text-align: center;
            vertical-align: middle;
            font-size: 1.1rem;
        }

        .bloque-header {
            background-color: #f1f5f9;
            font-weight: bold;
            text-align: center;
        }

        .subtotal-row {
            background-color: #d1fae5;
            font-weight: bold;
        }

        .total-row {
            background-color: #facc15;
            font-weight: bold;
            text-align: right;
        }

        select, input[type="number"] {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            width: 100%;
            background: white;
        }

        .btn-add {
            background: #10b981;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 10px;
        }

        .btn-add:hover { background: #059669; }

        .btn-del {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-del:hover { background: #dc2626; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">🥗 Planificador Nutricional Semanal</h2>
        
        <div class="top-bar">
            <input type="text" id="buscador" placeholder="Buscar alimento por nombre o código..." oninput="handleSearch(event)">
            <div class="badges">
                <span class="badge" id="total-alimentos">0 alimentos cargados</span>
                <span class="badge" id="total-coincidencias">0 coincidencias</span>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 110px;">DÍA</th>
                    <th style="width: 280px;">BLOQUE</th>
                    <th>DESCRIPCIÓN (Selecciona un alimento)</th>
                    <th style="width: 110px;">PORCIÓN (g)</th>
                    <th style="width: 80px;">KCAL</th>
                    <th style="width: 80px;">PROT (g)</th>
                    <th style="width: 80px;">CARB (g)</th>
                    <th style="width: 80px;">GRASA (g)</th>
                    <th style="width: 70px;">ACCIÓN</th>
                </tr>
            </thead>
            <tbody id="tabla-planificador">
                <!-- Se genera dinámicamente con la estructura original -->
            </tbody>
        </table>
    </div>

    <script>
        // Base de datos de ejemplo (puedes reemplazarla con tus 2030 elementos)
        let baseDatos = [
            { codigo: "H1", nombre: "Huevo entero cocido", kcal: 155, proteinas: 12.6, carbohidratos: 1.1, grasas: 10.6 },
            { codigo: "A1", nombre: "Atún en conserva", kcal: 116, proteinas: 26.0, carbohidratos: 0.0, grasas: 1.0 },
            { codigo: "P1", nombre: "Palta", kcal: 160, proteinas: 2.0, carbohidratos: 8.5, grasas: 14.7 },
            { codigo: "AV1", nombre: "Avena", kcal: 389, proteinas: 16.9, carbohidratos: 66.3, grasas: 6.9 },
            { codigo: "L1", nombre: "Leche entera", kcal: 61, proteinas: 3.2, carbohidratos: 4.8, grasas: 3.3 },
            { codigo: "F1", nombre: "Fresa", kcal: 32, proteinas: 0.7, carbohidratos: 7.7, grasas: 0.3 },
            { codigo: "Y1", nombre: "Yogur griego", kcal: 59, proteinas: 10.0, carbohidratos: 3.6, grasas: 0.4 },
            { codigo: "AL1", nombre: "Almendra", kcal: 579, proteinas: 21.1, carbohidratos: 21.5, grasas: 49.9 }
        ];

        let searchTimeout;

        function initApp() {
            document.getElementById('total-alimentos').innerText = `${baseDatos.length} alimentos cargados`;
            document.getElementById('total-coincidencias').innerText = `${baseDatos.length} coincidencias`;
            renderEstructura(baseDatos);
        }

        function renderEstructura(datosAlimentos) {
            const tbody = document.getElementById('tabla-planificador');
            const optionsHtml = datosAlimentos.map(a => `<option value="${a.nombre}">${a.nombre}</option>`).join('');

            let html = `
                <!-- LUNES -->
                <tr>
                    <td rowspan="16" class="dia-col">Lunes</td>
                    <td colspan="8" class="bloque-header">
                        COMIDA - DESAYUNO/ALMUERZO/CENA 
                        <button class="btn-add" onclick="agregarFilaBloque('comida')">+ Agregar</button>
                    </td>
                </tr>
                <tr>
                    <td>COMIDA</td>
                    <td><select>${optionsHtml}</select></td>
                    <td><input type="number" value="150"></td>
                    <td>232.5</td><td>18.9</td><td>1.7</td><td>15.9</td>
                    <td><button class="btn-del" onclick="this.closest('tr').remove()">X</button></td>
                </tr>
                <tr class="subtotal-row">
                    <td colspan="3">TOTAL COMIDA - DESAYUNO/ALMUERZO/CENA:</td>
                    <td>232.5</td><td>18.9</td><td>1.7</td><td>15.9</td>
                    <td></td>
                </tr>

                <tr>
                    <td colspan="8" class="bloque-header">
                        BATIDO MAÑANA 
                        <button class="btn-add" onclick="agregarFilaBloque('batido-manana')">+ Agregar</button>
                    </td>
                </tr>
                <tr>
                    <td>BATIDO MAÑANA</td>
                    <td><select>${optionsHtml}</select></td>
                    <td><input type="number" value="50"></td>
                    <td>194.5</td><td>8.4</td><td>33.1</td><td>3.5</td>
                    <td><button class="btn-del" onclick="this.closest('tr').remove()">X</button></td>
                </tr>
                <tr class="subtotal-row">
                    <td colspan="3">TOTAL BATIDO MAÑANA:</td>
                    <td>194.5</td><td>8.4</td><td>33.1</td><td>3.5</td>
                    <td></td>
                </tr>

                <tr>
                    <td colspan="8" class="bloque-header">
                        BATIDO MEDIAMAÑANA 
                        <button class="btn-add" onclick="agregarFilaBloque('batido-mediodia')">+ Agregar</button>
                    </td>
                </tr>
                <tr>
                    <td>BATIDO MEDIAMAÑANA</td>
                    <td><select>${optionsHtml}</select></td>
                    <td><input type="number" value="100"></td>
                    <td>32.0</td><td>0.7</td><td>7.7</td><td>0.3</td>
                    <td><button class="btn-del" onclick="this.closest('tr').remove()">X</button></td>
                </tr>
                <tr class="subtotal-row">
                    <td colspan="3">TOTAL BATIDO MEDIAMAÑANA:</td>
                    <td>32.0</td><td>0.7</td><td>7.7</td><td>0.3</td>
                    <td></td>
                </tr>

                <tr>
                    <td colspan="8" class="bloque-header">
                        BATIDO NOCHE 
                        <button class="btn-add" onclick="agregarFilaBloque('batido-noche')">+ Agregar</button>
                    </td>
                </tr>
                <tr>
                    <td>BATIDO NOCHE</td>
                    <td><select>${optionsHtml}</select></td>
                    <td><input type="number" value="250"></td>
                    <td>152.5</td><td>8.0</td><td>12.0</td><td>8.3</td>
                    <td><button class="btn-del" onclick="this.closest('tr').remove()">X</button></td>
                </tr>
                <tr class="subtotal-row">
                    <td colspan="3">TOTAL BATIDO NOCHE:</td>
                    <td>152.5</td><td>8.0</td><td>12.0</td><td>8.3</td>
                    <td></td>
                </tr>

                <tr class="total-row">
                    <td colspan="4">TOTAL DÍA LUNES:</td>
                    <td>611.5</td><td>36.0</td><td>54.5</td><td>28.0</td>
                    <td></td>
                </tr>
            `;
            tbody.innerHTML = html;
        }

        // Búsqueda optimizada con Debounce
        function handleSearch(event) {
            clearTimeout(searchTimeout);
            const query = event.target.value.toLowerCase();
            
            searchTimeout = setTimeout(() => {
                const filtrados = baseDatos.filter(item => 
                    item.nombre.toLowerCase().includes(query) || 
                    item.codigo.toLowerCase().includes(query)
                );
                document.getElementById('total-coincidencias').innerText = `${filtrados.length} coincidencias`;
                // Actualiza los selectores con las coincidencias encontradas
                renderEstructura(filtrados.length > 0 ? filtrados : baseDatos);
            }, 250);
        }

        function agregarFilaBloque(tipo) {
            alert("Acción para añadir nueva fila al bloque: " + tipo);
        }

        initApp();
    </script>
</body>
</html>
