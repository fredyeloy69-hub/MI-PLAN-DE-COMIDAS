<!-- Sección de Búsqueda -->
<div class="buscador-contenedor">
  <input type="text" id="buscarAlimento" placeholder="Buscar alimento por nombre..." autocomplete="off">
  <div id="listaResultados"></div>
</div>

<!-- Tabla de Consumo Diario / Receta -->
<table border="1" style="width: 100%; margin-top: 20px; text-align: left;">
  <thead>
    <tr>
      <th>Alimento</th>
      <th>Porción (g)</th>
      <th>Kcal</th>
      <th>Proteínas (g)</th>
      <th>Carbos (g)</th>
      <th>Grasas (g)</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody id="cuerpoTabla"></tbody>
  <tfoot>
    <tr style="font-weight: bold; background-color: #f0f0f0;">
      <td colspan="2">Total Acumulado</td>
      <td id="totalKcal">0.0</td>
      <td id="totalProt">0.0</td>
      <td id="totalCarb">0.0</td>
      <td id="totalGrasa">0.0</td>
      <td></td>
    </tr>
  </tfoot>
</table>

<script>
let baseDatosAlimentos = [];
let consumoActual = [];

// 1. Cargar la base de datos completa de ambos PDFs al iniciar
async function cargarBaseDatos() {
  try {
    const respuesta = await fetch('alimentos.json');
    baseDatosAlimentos = await respuesta.json();
  } catch (error) {
    console.error("Error cargando el archivo alimentos.json:", error);
  }
}

// 2. Filtrado en tiempo real del buscador
document.getElementById('buscarAlimento').addEventListener('input', (e) => {
  const consulta = e.target.value.trim().toLowerCase();
  const contenedor = document.getElementById('listaResultados');
  contenedor.innerHTML = '';

  if (consulta.length < 2) return; // Buscar a partir de 2 caracteres

  const resultados = baseDatosAlimentos
    .filter(item => item.nombre.toLowerCase().includes(consulta))
    .slice(0, 8); // Limitar a 8 resultados para mantener la interfaz limpia

  resultados.forEach(alimento => {
    const div = document.createElement('div');
    div.style.padding = "8px";
    div.style.cursor = "pointer";
    div.style.borderBottom = "1px solid #ccc";
    div.textContent = `${alimento.nombre} — ${alimento.kcal} kcal / 100g`;
    
    div.onclick = () => {
      agregarAlimento(alimento);
      contenedor.innerHTML = '';
      document.getElementById('buscarAlimento').value = '';
    };
    
    contenedor.appendChild(div);
  });
});

// 3. Agregar alimento al listado de consumo (por defecto 100g)
function agregarAlimento(alimento) {
  consumoActual.push({ ...alimento, gramos: 100 });
  renderizarTabla();
}

// 4. Renderizar tabla y aplicar fórmulas matemáticas
function renderizarTabla() {
  const cuerpo = document.getElementById('cuerpoTabla');
  cuerpo.innerHTML = '';

  let totales = { kcal: 0, prot: 0, carb: 0, grasa: 0 };

  consumoActual.forEach((item, index) => {
    const factor = item.gramos / 100;
    const kcal = (item.kcal * factor);
    const prot = (item.proteinas * factor);
    const carb = (item.carbohidratos * factor);
    const grasa = (item.grasas * factor);

    totales.kcal += kcal;
    totales.prot += prot;
    totales.carb += carb;
    totales.grasa += grasa;

    const fila = document.createElement('tr');
    fila.innerHTML = `
      <td>${item.nombre}</td>
      <td>
        <input type="number" value="${item.gramos}" min="0" step="5" 
               onchange="actualizarGramos(${index}, this.value)" 
               style="width: 70px; padding: 4px;"> g
      </td>
      <td>${kcal.toFixed(1)}</td>
      <td>${prot.toFixed(1)}</td>
      <td>${carb.toFixed(1)}</td>
      <td>${grasa.toFixed(1)}</td>
      <td><button onclick="eliminarAlimento(${index})" style="color: red;">✕</button></td>
    `;
    cuerpo.appendChild(fila);
  });

  // Actualizar pie de tabla con totales exactos
  document.getElementById('totalKcal').textContent = totales.kcal.toFixed(1);
  document.getElementById('totalProt').textContent = totales.prot.toFixed(1);
  document.getElementById('totalCarb').textContent = totales.carb.toFixed(1);
  document.getElementById('totalGrasa').textContent = totales.grasa.toFixed(1);
}

// 5. Modificar cantidad de gramos en vivo
function actualizarGramos(index, nuevosGramos) {
  consumoActual[index].gramos = parseFloat(nuevosGramos) || 0;
  renderizarTabla();
}

// 6. Eliminar ítem de la lista
function eliminarAlimento(index) {
  consumoActual.splice(index, 1);
  renderizarTabla();
}

// Inicializar
cargarBaseDatos();
</script>
