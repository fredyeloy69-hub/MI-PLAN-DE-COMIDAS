<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Nutricional Semanal</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 98%;
            max-width: 1600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        #buscador {
            flex: 1;
            min-width: 280px;
            padding: 10px 16px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }

        .badge {
            background: #e2e8f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        th, td {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
        }

        .dia-col {
            background-color: #1e293b;
            color: white;
            font-weight: bold;
            text-align: center;
            vertical-align: middle;
            font-size: 1.1rem;
        }

        .bloque-header {
            background-color: #f1f5f9;
            font-weight: bold;
        }

        .subtotal-row {
            background-color: #d1fae5;
            font-weight: bold;
        }

        .total-row {
            background-color: #facc15;
            font-weight: bold;
            text-align: right;
        }

        select, input[type="number"] {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            width: 100%;
            background: white;
        }

        .btn-add {
            background: #10b981;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .btn-add:hover { background: #059669; }

        .btn-del {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-del:hover { background: #dc2626; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">🥗 Planificador Nutricional Semanal</h2>
        
        <div class="top-bar">
            <input type="text" id="buscador" placeholder="Buscar alimento por nombre o código..." oninput="handleSearch(event)">
            <div class="badges">
                <span class="badge" id="total-alimentos">0 alimentos cargados</span>
                <span class="badge" id="total-coincidencias">0 coincidencias</span>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 110px;">DÍA</th>
                    <th style="width: 280px;">BLOQUE</th>
                    <th>DESCRIPCIÓN (Selecciona un alimento)</th>
                    <th style="width: 110px;">PORCIÓN (g)</th>
                    <th style="width: 80px;">KCAL</th>
                    <th style="width: 80px;">PROT (g)</th>
                    <th style="width: 80px;">CARB (g)</th>
                    <th style="width: 80px;">GRASA (g)</th>
                    <th style="width: 70px;">ACCIÓN</th>
                </tr>
            </thead>
            <tbody id="tabla-planificador">
                <!-- Se inyecta por JS -->
            </tbody>
        </table>
    </div>

    <script>
        // Valores base por cada 100 gramos
        let baseDatos = [
            { nombre: "Huevo entero cocido", kcal: 155, proteinas: 12.6, carbohidratos: 1.1, grasas: 10.6 },
            { nombre: "Atún en conserva", kcal: 116, proteinas: 26.0, carbohidratos: 0.0, grasas: 1.0 },
            { nombre: "Palta", kcal: 160, proteinas: 2.0, carbohidratos: 8.5, grasas: 14.7 },
            { nombre: "Avena", kcal: 389, proteinas: 16.9, carbohidratos: 66.3, grasas: 6.9 },
            { nombre: "Leche entera", kcal: 61, proteinas: 3.2, carbohidratos: 4.8, grasas: 3.3 },
            { nombre: "Fresa", kcal: 32, proteinas: 0.7, carbohidratos: 7.7, grasas: 0.3 },
            { nombre: "Yogur griego", kcal: 59, proteinas: 10.0, carbohidratos: 3.6, grasas: 0.4 },
            { nombre: "Almendra", kcal: 579, proteinas: 21.1, carbohidratos: 21.5, grasas: 49.9 }
        ];

        let searchTimeout;

        function initApp() {
            document.getElementById('total-alimentos').innerText = `${baseDatos.length} alimentos cargados`;
            document.getElementById('total-coincidencias').innerText = `${baseDatos.length} coincidencias`;
            renderEstructura(baseDatos);
        }

        function renderEstructura(datosAlimentos) {
            const tbody = document.getElementById('tabla-planificador');
            const optionsHtml = datosAlimentos.map(a => `<option value="${a.nombre}">${a.nombre}</option>`).join('');

            tbody.innerHTML = `
                <!-- LUNES -->
                <tr>
                    <td rowspan="16" class="dia-col">Lunes</td>
                    <td colspan="8" class="bloque-header">
                        COMIDA - DESAYUNO/ALMUERZO/CENA 
                        <button class="btn-add" onclick="agregarFila('comida-tbody', '${optionsHtml.replace(/"/g, '&quot;')}')">+ Agregar</button>
                    </td>
                </tr>
                <tbody id="comida-tbody">
                    <tr class="item-row">
                        <td>COMIDA</td>
                        <td><select class="select-alimento" onchange="actualizarFila(this)">${optionsHtml}</select></td>
                        <td><input type="number" class="input-porcion" value="150" oninput="actualizarFila(this)"></td>
                        <td class="cell-kcal">0.0</td>
                        <td class="cell-prot">0.0</td>
                        <td class="cell-carb">0.0</td>
                        <td class="cell-grasa">0.0</td>
                        <td><button class="btn-del" onclick="eliminarFila(this)">X</button></td>
                    </tr>
                </tbody>
                <tr class="subtotal-row">
                    <td colspan="3">TOTAL COMIDA - DESAYUNO/ALMUERZO/CENA:</td>
                    <td class="sub-kcal">0.0</td><td class="sub-prot">0.0</td><td class="sub-carb">0.0</td><td class="sub-grasa">0.0</td>
                    <td></td>
                </tr>

                <tr>
                    <td colspan="8" class="bloque-header">
                        BATIDO MAÑANA 
                        <button class="btn-add" onclick="agregarFila('batido1-tbody', '${optionsHtml.replace(/"/g, '&quot;')}')">+ Agregar</button>
                    </td>
                </tr>
                <tbody id="batido1-tbody">
                    <tr class="item-row">
                        <td>BATIDO MAÑANA</td>
                        <td><select class="select-alimento" onchange="actualizarFila(this)">${optionsHtml}</select></td>
                        <td><input type="number" class="input-porcion" value="50" oninput="actualizarFila(this)"></td>
                        <td class="cell-kcal">0.0</td>
                        <td class="cell-prot">0.0</td>
                        <td class="cell-carb">0.0</td>
                        <td class="cell-grasa">0.0</td>
                        <td><button class="btn-del" onclick="eliminarFila(this)">X</button></td>
                    </tr>
                </tbody>
                <tr class="subtotal-row">
                    <td colspan="3">TOTAL BATIDO MAÑANA:</td>
                    <td class="sub-kcal">0.0</td><td class="sub-prot">0.0</td><td class="sub-carb">0.0</td><td class="sub-grasa">0.0</td>
                    <td></td>
                </tr>

                <tr class="total-row">
                    <td colspan="4">TOTAL DÍA LUNES:</td>
                    <td id="total-kcal">0.0</td><td id="total-prot">0.0</td><td id="total-carb">0.0</td><td id="total-grasa">0.0</td>
                    <td></td>
                </tr>
            `;
            recalcularTodo();
        }

        function agregarFila(tbodyId, optionsHtml) {
            const tbody = document.getElementById(tbodyId);
            const tr = document.createElement('tr');
            tr.className = 'item-row';
            tr.innerHTML = `
                <td>ITEM</td>
                <td><select class="select-alimento" onchange="actualizarFila(this)">${optionsHtml}</select></td>
                <td><input type="number" class="input-porcion" value="100" oninput="actualizarFila(this)"></td>
                <td class="cell-kcal">0.0</td>
                <td class="cell-prot">0.0</td>
                <td class="cell-carb">0.0</td>
                <td class="cell-grasa">0.0</td>
                <td><button class="btn-del" onclick="eliminarFila(this)">X</button></td>
            `;
            tbody.appendChild(tr);
            recalcularTodo();
        }

        function eliminarFila(btn) {
            const tr = btn.closest('tr');
            tr.remove();
            recalcularTodo();
        }

        function actualizarFila(element) {
            recalcularTodo();
        }

        function recalcularTodo() {
            let totalKcal = 0, totalProt = 0, totalCarb = 0, totalGrasa = 0;

            // Procesar bloques de forma genérica
            const secciones = ['comida-tbody', 'batido1-tbody'];
            
            secciones.forEach(tbodyId => {
                const tbody = document.getElementById(tbodyId);
                if (!tbody) return;
                
                let subKcal = 0, subProt = 0, subCarb = 0, subGrasa = 0;
                const filas = tbody.querySelectorAll('.item-row');

                filas.forEach(fila => {
                    const nombreAlimento = fila.querySelector('.select-alimento').value;
                    const porcion = parseFloat(fila.querySelector('.input-porcion').value) || 0;
                    
                    const alimento = baseDatos.find(a => a.nombre === nombreAlimento);
                    if (alimento) {
                        const factor = porcion / 100;
                        const k = alimento.kcal * factor;
                        const p = alimento.proteinas * factor;
                        const c = alimento.carbohidratos * factor;
                        const g = alimento.grasas * factor;

                        fila.querySelector('.cell-kcal').innerText = k.toFixed(1);
                        fila.querySelector('.cell-prot').innerText = p.toFixed(1);
                        fila.querySelector('.cell-carb').innerText = c.toFixed(1);
                        fila.querySelector('.cell-grasa').innerText = g.toFixed(1);

                        subKcal += k; subProt += p; subCarb += c; subGrasa += g;
                    }
                });

                // Actualizar subtotal de la sección
                const subtr = tbody.nextElementSibling;
                if (subtr && subtr.classList.contains('subtotal-row')) {
                    subtr.querySelector('.sub-kcal').innerText = subKcal.toFixed(1);
                    subtr.querySelector('.sub-prot').innerText = subProt.toFixed(1);
                    subtr.querySelector('.sub-carb').innerText = subCarb.toFixed(1);
                    subtr.querySelector('.sub-grasa').innerText = subGrasa.toFixed(1);
                }

                totalKcal += subKcal; totalProt += subProt; totalCarb += subCarb; totalGrasa += subGrasa;
            });

            // Actualizar totales generales del día
            document.getElementById('total-kcal').innerText = totalKcal.toFixed(1);
            document.getElementById('total-prot').innerText = totalProt.toFixed(1);
            document.getElementById('total-carb').innerText = totalCarb.toFixed(1);
            document.getElementById('total-grasa').innerText = totalGrasa.toFixed(1);
        }

        function handleSearch(event) {
            clearTimeout(searchTimeout);
            const query = event.target.value.toLowerCase();
            searchTimeout = setTimeout(() => {
                const filtrados = baseDatos.filter(item => item.nombre.toLowerCase().includes(query));
                document.getElementById('total-coincidencias').innerText = `${filtrados.length} coincidencias`;
                renderEstructura(filtrados.length > 0 ? filtrados : baseDatos);
            }, 250);
        }

        initApp();
    </script>
</body>
</html>
