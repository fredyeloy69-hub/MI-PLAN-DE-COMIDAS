<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Semanal - C.S. ILAVE</title>
    <style>
        :root { --bg-color: #f4f6f9; --text-color: #333; --card-bg: #fff; --header-bg: #1a5276; --header-text: #fff; }
        .dark-mode { --bg-color: #121212; --text-color: #e0e0e0; --card-bg: #1e1e1e; --header-bg: #0d2b4d; --header-text: #fff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: var(--header-bg); color: var(--header-text); }
        textarea { width: 95%; height: 70px; border: 1px solid #ccc; background: var(--bg-color); color: var(--text-color); border-radius: 4px; padding: 5px; resize: vertical; }
        .btn-save { background: #28a745; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 20px; border-radius: 6px; font-weight: bold; }
        .btn-dark { margin-bottom: 10px; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Planificador Semanal</h1>
        <button class="btn-dark" onclick="document.body.classList.toggle('dark-mode')">🌙 Modo Oscuro / Claro</button>
        <table id="meal-table">
            <thead><tr><th>Día</th><th>Desayuno</th><th>Almuerzo</th><th>Cena</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
        <button class="btn-save" onclick="guardarDatos()">💾 GUARDAR CAMBIOS</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAHuj8MQUbiHuRO3xS5Wvfo9WsJYrPf298",
            authDomain: "comidas-diarias-a8e84.firebaseapp.com",
            databaseURL: "https://comidas-diarias-a8e84-default-rtdb.firebaseio.com",
            projectId: "comidas-diarias-a8e84",
            storageBucket: "comidas-diarias-a8e84.firebasestorage.app",
            messagingSenderId: "391611390856",
            appId: "1:391611390856:web:20f10e83dbb9cfb0a2783d",
            measurementId: "G-D8XEJRHV6R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];

        // Generar filas dinámicamente
        const tbody = document.getElementById('table-body');
        dias.forEach(dia => {
            tbody.innerHTML += `<tr>
                <td><b>${dia}</b></td>
                <td><textarea id="des-${dia}"></textarea></td>
                <td><textarea id="alm-${dia}"></textarea></td>
                <td><textarea id="cen-${dia}"></textarea></td>
            </tr>`;
        });

        // Cargar datos automáticamente desde Firebase
        onValue(ref(db, 'comidas_semanales/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                dias.forEach(dia => {
                    if (data[dia]) {
                        document.getElementById(`des-${dia}`).value = data[dia].desayuno || "";
                        document.getElementById(`alm-${dia}`).value = data[dia].almuerzo || "";
                        document.getElementById(`cen-${dia}`).value = data[dia].cena || "";
                    }
                });
            }
        });

        // Función para guardar
        window.guardarDatos = () => {
            const data = {};
            dias.forEach(dia => {
                data[dia] = {
                    desayuno: document.getElementById(`des-${dia}`).value,
                    almuerzo: document.getElementById(`alm-${dia}`).value,
                    cena: document.getElementById(`cen-${dia}`).value
                };
            });
            set(ref(db, 'comidas_semanales/'), data).then(() => {
                alert("¡Datos guardados con éxito en la Nube!");
            }).catch((error) => {
                alert("Error al guardar: " + error.message);
            });
        };
    </script>
</body>
</html>
