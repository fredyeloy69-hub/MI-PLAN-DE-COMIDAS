<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Semanal - C.S. ILAVE</title>
    <!-- Conexión con tus estilos -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Planificador Semanal</h1>
        <button class="btn-dark" onclick="document.body.classList.toggle('dark-mode')">🌙 Modo Oscuro / Claro</button>
        <table id="meal-table">
            <thead><tr><th>Día</th><th>Desayuno</th><th>Almuerzo</th><th>Cena</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
        <button class="btn-save" onclick="guardarDatos()">💾 GUARDAR CAMBIOS</button>
    </div>

    <!-- Conexión con tu lógica de cálculos y compras -->
    <script src="js/main.js" type="module"></script>

    <!-- Conexión con Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHuj8MQUbiHuRO3xS5Wvfo9WsJYrPf298",
            authDomain: "comidas-diarias-a8e84.firebaseapp.com",
            databaseURL: "https://comidas-diarias-a8e84-default-rtdb.firebaseio.com",
            projectId: "comidas-diarias-a8e84",
            storageBucket: "comidas-diarias-a8e84.firebasestorage.app",
            messagingSenderId: "391611390856",
            appId: "1:391611390856:web:20f10e83dbb9cfb0a2783d",
            measurementId: "G-D8XEJRHV6R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];

        const tbody = document.getElementById('table-body');
        dias.forEach(dia => {
            tbody.innerHTML += `<tr>
                <td><b>${dia}</b></td>
                <td><textarea id="des-${dia}"></textarea></td>
                <td><textarea id="alm-${dia}"></textarea></td>
                <td><textarea id="cen-${dia}"></textarea></td>
            </tr>`;
        });

        onValue(ref(db, 'comidas_semanales/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                dias.forEach(dia => {
                    if (data[dia]) {
                        document.getElementById(`des-${dia}`).value = data[dia].desayuno || "";
                        document.getElementById(`alm-${dia}`).value = data[dia].almuerzo || "";
                        document.getElementById(`cen-${dia}`).value = data[dia].cena || "";
                    }
                });
            }
        });

        window.guardarDatos = () => {
            const data = {};
            dias.forEach(dia => {
                data[dia] = {
                    desayuno: document.getElementById(`des-${dia}`).value,
                    almuerzo: document.getElementById(`alm-${dia}`).value,
                    cena: document.getElementById(`cen-${dia}`).value
                };
            });
            set(ref(db, 'comidas_semanales/'), data).then(() => {
                alert("¡Datos guardados con éxito en la Nube!");
            }).catch((error) => {
                alert("Error al guardar: " + error.message);
            });
        };
    </script>
</body>
</html>
